<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地图片坐标提取工具 (Local BBox Tool)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h2 { color: #333; }
        
        /* 控制面板区域 */
        .controls {
            margin-bottom: 15px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 800px;
        }

        /* 画布容器 */
        .canvas-container {
            position: relative;
            border: 2px dashed #aaa;
            background-color: #ddd;
            /* 限制最大显示宽度，防止大图撑爆屏幕 */
            max-width: 90vw; 
            max-height: 80vh;
            overflow: hidden;
            cursor: crosshair;
        }

        /* 结果显示区 */
        .result-box {
            margin-top: 15px;
            font-family: monospace;
            font-size: 1.2em;
            color: #d63384;
            background: #eee;
            padding: 10px;
            border-radius: 4px;
            display: inline-block;
        }

        input[type="file"] {
            margin-bottom: 10px;
        }

        .info {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h2>📍 图片提示坐标提取工具</h2>

    <div class="controls">
        <input type="file" id="imageLoader" accept="image/*">
        <br>
        <span class="info">当前状态：<span id="statusText">请上传图片</span></span>
        <br>
        <div class="result-box" id="outputCoords">坐标将显示在这里</div>
        <button onclick="copyCoords()" style="margin-left:10px; cursor:pointer;">复制坐标</button>
    </div>

    <div class="canvas-container" id="container">
        <canvas id="imageCanvas"></canvas>
    </div>

    <script>
        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('outputCoords');
        const statusText = document.getElementById('statusText');
        const container = document.getElementById('container');

        let img = new Image();
        let scaleFactor = 1; // 原始尺寸 / 显示尺寸
        let isDrawing = false;
        let startX, startY;
        let currentBox = null;

        // 1. 加载图片
        imageLoader.addEventListener('change', handleImage, false);

        function handleImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                img = new Image();
                img.onload = function() {
                    setupCanvas();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        // 2. 设置画布与缩放逻辑
        function setupCanvas() {
            // 获取容器（屏幕）允许的最大宽高
            const maxWidth = container.clientWidth;
            // 简单设置一个最大高度限制
            const maxHeight = window.innerHeight * 0.8;

            // 计算缩放比例，让图片适应屏幕
            let width = img.width;
            let height = img.height;
            
            // 计算适合屏幕的宽高
            if (width > maxWidth || height > maxHeight) {
                const ratio = Math.min(maxWidth / width, maxHeight / height);
                width = width * ratio;
                height = height * ratio;
            }

            // 设置画布的“显示大小” (CSS pixels)
            canvas.style.width = width + "px";
            canvas.style.height = height + "px";

            // 设置画布的“物理分辨率” (实际像素)
            // 为了清晰度，我们让画布分辨率等于显示大小，或者使用 window.devicePixelRatio 优化
            // 这里为了计算简单，我们将画布分辨率设为图片显示的大小
            canvas.width = width;
            canvas.height = height;

            // **核心逻辑**：计算缩放因子
            // 原始 4000px -> 屏幕 800px -> 因子 = 5
            scaleFactor = img.width / width;

            statusText.innerText = `原始尺寸: ${img.width}x${img.height} | 显示尺寸: ${Math.round(width)}x${Math.round(height)} | 缩放因子: ${scaleFactor.toFixed(3)}`;
            
            // 绘制图片
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }

        // 3. 鼠标画框逻辑
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            // 每一帧都重绘图片，清除之前的框
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // 画红色的框
            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.strokeRect(startX, startY, mouseX - startX, mouseY - startY);
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;

            // 处理反向拖拽 (从右下往左上画)
            let x1 = Math.min(startX, endX);
            let y1 = Math.min(startY, endY);
            let x2 = Math.max(startX, endX);
            let y2 = Math.max(startY, endY);

            // **核心转换**：乘缩放因子，并取整
            let realX1 = Math.round(x1 * scaleFactor);
            let realY1 = Math.round(y1 * scaleFactor);
            let realX2 = Math.round(x2 * scaleFactor);
            let realY2 = Math.round(y2 * scaleFactor);

            // 边界检查 (防止划出图片外)
            realX1 = Math.max(0, realX1);
            realY1 = Math.max(0, realY1);
            realX2 = Math.min(img.width, realX2);
            realY2 = Math.min(img.height, realY2);

            // 显示结果
            const result = `[${realX1}, ${realY1}, ${realX2}, ${realY2}]`;
            output.innerText = result;
            
            // 最终重绘一次确定的框
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#00FF00"; // 确定后变绿
            ctx.lineWidth = 2;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        });

        function copyCoords() {
            const text = output.innerText;
            if(text.includes("[")) {
                navigator.clipboard.writeText(text).then(() => {
                    alert("已复制: " + text);
                });
            } else {
                alert("请先画框");
            }
        }
    </script>
</body>
</html>
